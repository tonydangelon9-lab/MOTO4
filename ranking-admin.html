<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto4 FIM Latin America Cup · Campeonato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @font-face{font-family:"MGP Display";src:url("05-MGP-FONT/MGPDisplay-Bold.ttf") format("truetype");font-weight:700;font-display:swap}
  @font-face{font-family:"MGP Display";src:url("05-MGP-FONT/MGPDisplay-Medium.ttf") format("truetype");font-weight:500;font-display:swap}
  @font-face{font-family:"MGP Display Exp";src:url("05-MGP-FONT/MGPDisplay-BoldExpanded.ttf") format("truetype");font-weight:700;font-display:swap}
  :root{
    --bg:#000000; --surface:#0e0410; --surface2:#160518; --line:#2a0f30;
    --violet:#C604F7; --magenta:#D63DFC; --txt:#f2eefb; --muted:#b79bc0;
    --green:#22c55e; --red:#ef4444; --gold:#facc15;
    --grad:linear-gradient(120deg,#C604F7,#D63DFC,#E37BFD);
    --disp:"MGP Display","Arial Narrow",Arial,sans-serif;
    --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--body)}
  input{font-family:inherit}
  #app{max-width:1180px;margin:0 auto;padding:16px 12px 90px}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
    padding:4px 2px 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .brand{display:flex;align-items:center;gap:14px}
  header img.logo{height:54px;width:auto;display:block;flex:0 0 auto}
  @media(max-width:560px){header img.logo{height:40px}.brand{gap:10px}}
  .k{font-family:var(--disp);font-size:11px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase}
  header h1{font-family:var(--disp);font-size:26px;margin:4px 0 0;font-weight:800;letter-spacing:.03em;text-transform:uppercase;line-height:1}
  header h1 b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.02em}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .btn{border:none;border-radius:10px;font-family:var(--disp);letter-spacing:.04em;text-transform:uppercase;
    font-size:13px;font-weight:700;padding:10px 14px;color:#fff;background:var(--grad);cursor:pointer}
  .btn:active{transform:scale(.98)}
  .ghost{background:var(--surface);border:1px solid var(--line);color:var(--txt);
    font-family:var(--disp);letter-spacing:.04em;text-transform:uppercase;border-radius:10px;
    padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .ghost:active{background:var(--surface2)}
  .ver{font-size:10px;color:var(--muted)}
  .tools{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .tools button{flex:0 1 auto}
  .editing-on .ghost.editbtn{background:var(--grad);border-color:transparent;color:#fff}
  .scroll{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--surface)}
  table{border-collapse:collapse;width:100%;min-width:1080px}
  thead th{font-family:var(--disp);text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);background:var(--surface2);font-weight:700;padding:8px 6px;text-align:center}
  thead tr.grp th{font-size:11px;letter-spacing:.12em;padding-top:11px;border-bottom:none}
  thead tr.col th{font-size:11px;letter-spacing:.06em;padding-bottom:11px}
  thead th.l{text-align:left}
  .gbrasil{color:#7dd3fc}.garg{color:#fcd34d}
  tbody td{padding:4px 6px;border-bottom:1px solid var(--line);text-align:center;font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  td.l{text-align:left}
  .c-pos{width:46px;font-family:var(--disp);font-weight:800;font-size:16px}
  .c-num{width:50px;color:var(--muted);font-weight:600}
  .c-pil{min-width:200px;text-align:left;font-weight:600;font-size:15px}
  .c-nac{min-width:104px;font-size:12px;color:var(--muted);letter-spacing:.04em}
  .c-fmn{width:74px;font-size:11px;color:var(--muted)}
  .c-v{width:58px}
  .c-tot{width:74px}
  .c-tot b{font-family:var(--disp);font-size:18px;color:var(--gold);font-weight:800}
  .c-del{width:40px}
  tr.p1 .c-pos{color:#ffd700}tr.p2 .c-pos{color:#cfd8dc}tr.p3 .c-pos{color:#e0a96d}
  tr.p1{background:linear-gradient(90deg,rgba(250,204,21,.10),transparent)}
  td input{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:7px;
    color:var(--txt);font-size:14px;padding:8px 6px;text-align:center;font-variant-numeric:tabular-nums}
  td.l input,td.c-pil input,td.c-nac input{text-align:left}
  td input:focus{outline:none;border-color:var(--violet)}
  .del{background:none;border:none;color:#6a5d7e;font-size:18px;cursor:pointer}
  .del:active{color:var(--red)}
  .foot{font-size:11px;color:var(--muted);padding:14px 4px;text-align:center;letter-spacing:.02em}
  .badge{display:inline-block;font-family:var(--disp);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);margin-left:6px}
  #toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(140%);
    background:#222;color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,.5);transition:transform .28s ease;z-index:50;max-width:90vw;text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.ok{background:#15351f;border:1px solid var(--green)}
  #toast.err{background:#371717;border:1px solid var(--red)}
  @media (prefers-reduced-motion:reduce){#toast{transition:none}}
  @media(max-width:560px){header h1{font-size:21px}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <img class="logo" src="00-LOGOTIPOS/Moto4_Latin_Cup_Inline_Purple_Grad_White_RGB.png" alt="Moto4 Latin Cup">
      <div>
        <div class="k">FIM Latin America Cup 2026</div>
        <h1>Campeonato</h1>
        <div class="sub">Clasificación general · El camino latino al MotoGP<span class="badge" id="modo">Solo lectura</span></div>
      </div>
    </div>
    <div class="right">
      <button class="ghost editbtn" id="editar">🔒 Editar</button>
      <div class="ver" id="ver"></div>
    </div>
  </header>

  <div class="tools" id="tools" style="display:none">
    <button class="ghost" id="agregar">+ Agregar piloto</button>
    <button class="ghost" id="ordenar">↓ Ordenar por puntos</button>
    <button class="btn" id="guardar">Guardar campeonato</button>
  </div>

  <div class="scroll">
    <table>
      <thead>
        <tr class="grp">
          <th class="l" rowspan="2">Pos</th>
          <th rowspan="2">N°</th>
          <th class="l" rowspan="2">Piloto</th>
          <th rowspan="2">Nac</th>
          <th rowspan="2">FMN</th>
          <th class="gbrasil" colspan="3">Brasil</th>
          <th class="garg" colspan="3">Argentina</th>
          <th rowspan="2">Total</th>
          <th rowspan="2" class="c-del editonly" style="display:none"></th>
        </tr>
        <tr class="col">
          <th class="gbrasil">1ª</th><th class="gbrasil">2ª</th><th class="gbrasil">3ª</th>
          <th class="garg">4ª</th><th class="garg">5ª</th><th class="garg">6ª</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="foot">Clase Moto4 · Honda · 6 válidas (3 Brasil + 3 Argentina) · Fuente oficial: FIM Latin America</div>
</div>

<div id="toast"></div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbystPCHyyVfaxG_ewOD5ZJSLgDEVctdN9rx817EyTT5ciGPMWoE-S45Isx6X4uEah0W/exec";
var PIN_OK  = "270913";
var VERSION = "v2026.06.30-CAMP2";
var STORE_KEY = "moto4_campeonato_2026";

// Datos oficiales precargados (PDF FIM LATAM — consolidado 1ª a 6ª válida)
// v = [Brasil1, Brasil2, Brasil3, Argentina4, Argentina5, Argentina6]
var DATA_DEFAULT = [
  { num:74, piloto:"Kensei Matsudaira",   nac:"USA",        fmn:"AMA",   v:[8,20,20,25,20,20] },
  { num:62, piloto:"Alberto Enriquez",    nac:"Ecuador",    fmn:"RFME",  v:[6.5,25,25,13,0,25] },
  { num:34, piloto:"Andoni Dominguez",    nac:"Nicaragua",  fmn:"FEM",   v:[12.5,13,6,11,25,11] },
  { num:10, piloto:"Mahdi Salem",         nac:"Palestina",  fmn:"PMSMF", v:[5.5,0,16,20,16,16] },
  { num:64, piloto:"Ulises Weyrauch",     nac:"USA",        fmn:"AMA",   v:[3.5,10,10,10,13,10] },
  { num:99, piloto:"Cristobal Carreño",   nac:"Chile",      fmn:"FEM",   v:[10,9,11,9,9,7] },
  { num:11, piloto:"Santiago Gossa",      nac:"Argentina",  fmn:"CAMOD", v:[0,0,13,16,11,9] },
  { num:46, piloto:"Nicolás Torrez",      nac:"Paraguay",   fmn:"FEMOP", v:[2.5,6,5,8,8,6] },
  { num:42, piloto:"Murilo Gomes",        nac:"Brasil",     fmn:"CBM",   v:[5,16,0,0,0,13] },
  { num:26, piloto:"Santiago Vogel",      nac:"Argentina",  fmn:"CAMOD", v:[0,7,8,0,10,8] },
  { num:91, piloto:"Aidan Hancock",       nac:"USA",        fmn:"AMA",   v:[1,4,4,7,7,5] },
  { num:19, piloto:"Lorenzo Tiberi",      nac:"Argentina",  fmn:"CAMOD", v:[4,11,9,0,0,0] },
  { num:69, piloto:"Anyelo Perdomo",      nac:"Venezuela",  fmn:"FMV",   v:[4.5,8,7,0,0,0] },
  { num:16, piloto:"Santiago Bravo",      nac:"Venezuela",  fmn:"FMV",   v:[2,5,3,0,0,0] },
  { num:8,  piloto:"Matias Alarcon",      nac:"Chile",      fmn:"FEM",   v:[3,0,0,0,0,0] },
  { num:15, piloto:"Gael Olivo",          nac:"México",     fmn:"FEM",   v:[1.5,0,0,0,0,0] }
];

var rows = [];
var editing = false;

function $(id){ return document.getElementById(id); }
function toast(m,k){ var t=$("toast"); t.textContent=m; t.className="show "+(k||""); clearTimeout(t._t); t._t=setTimeout(function(){t.className="";},2600); }
function num(x){ var n=parseFloat(x); return isNaN(n)?0:n; }
function totalDe(r){ return (r.v||[]).reduce(function(a,b){ return a+num(b); },0); }
function cloneRows(arr){ return (arr||[]).map(function(r){ return { num:r.num, piloto:r.piloto, nac:r.nac, fmn:r.fmn, v:(r.v||[]).slice(0,6) }; }); }

function api(body){
  return fetch(API_URL,{ method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(body), redirect:"follow" }).then(function(r){ return r.json(); });
}

function init(){
  $("ver").textContent=VERSION;
  var saved=null;
  try{ var s=localStorage.getItem(STORE_KEY); if(s) saved=JSON.parse(s); }catch(e){}
  rows = cloneRows(saved && saved.length ? saved : DATA_DEFAULT);
  ordenar(false);
  render();
  if(API_URL.indexOf("PEGAR_AQUI")<0){
    api({action:"cargarCamp"}).then(function(d){
      if(d && d.ok && d.filas && d.filas.length){
        // solo adopta la versión de la planilla si tiene puntos cargados
        var validas = d.filas.filter(function(r){ return totalDe(r) > 0; });
        if(validas.length){
          rows = cloneRows(d.filas);
          ordenar(false); render();
        }
      }
    }).catch(function(){});
  }
}

function ordenar(re){
  rows.sort(function(a,b){ return totalDe(b)-totalDe(a); });
  if(re) render();
}

function render(){
  document.body.classList.toggle("editing-on", editing);
  $("tools").style.display = editing ? "flex" : "none";
  $("modo").textContent = editing ? "Edición" : "Solo lectura";
  $("editar").textContent = editing ? "✓ Listo" : "🔒 Editar";
  document.querySelectorAll(".editonly").forEach(function(el){ el.style.display = editing ? "" : "none"; });

  var tb=$("tbody"); tb.innerHTML="";
  rows.forEach(function(r,i){
    var tot=totalDe(r);
    var tr=document.createElement("tr");
    var pos=i+1;
    if(pos<=3) tr.className="p"+pos;
    if(editing){
      tr.innerHTML =
        '<td class="c-pos l">'+pos+'</td>'+
        '<td class="c-num"><input data-k="num" value="'+at(r.num)+'"></td>'+
        '<td class="c-pil l"><input data-k="piloto" value="'+at(r.piloto)+'"></td>'+
        '<td class="c-nac"><input data-k="nac" value="'+at(r.nac)+'"></td>'+
        '<td class="c-fmn"><input data-k="fmn" value="'+at(r.fmn)+'"></td>'+
        vInputs(r)+
        '<td class="c-tot"><b>'+fmt(tot)+'</b></td>'+
        '<td class="c-del editonly"><button class="del">✕</button></td>';
      bindRow(tr,r,i);
    } else {
      tr.innerHTML =
        '<td class="c-pos l">'+pos+'</td>'+
        '<td class="c-num">'+at(r.num)+'</td>'+
        '<td class="c-pil l">'+at(r.piloto)+'</td>'+
        '<td class="c-nac">'+at(r.nac).toUpperCase()+'</td>'+
        '<td class="c-fmn">'+at(r.fmn)+'</td>'+
        vCells(r)+
        '<td class="c-tot"><b>'+fmt(tot)+'</b></td>';
    }
    tb.appendChild(tr);
  });
}
function vCells(r){
  var h=""; for(var i=0;i<6;i++){ var x=num(r.v[i]); h+='<td class="c-v">'+(x?fmt(x):'<span style="color:#5a4f70">·</span>')+'</td>'; } return h;
}
function vInputs(r){
  var h=""; for(var i=0;i<6;i++){ h+='<td class="c-v"><input data-vi="'+i+'" inputmode="decimal" value="'+at(r.v[i]||"")+'"></td>'; } return h;
}
function bindRow(tr,r,i){
  tr.querySelectorAll('input[data-k]').forEach(function(inp){
    inp.addEventListener("input",function(){ r[inp.getAttribute("data-k")]=inp.value; });
  });
  tr.querySelectorAll('input[data-vi]').forEach(function(inp){
    inp.addEventListener("input",function(){
      r.v[+inp.getAttribute("data-vi")]=inp.value;
      tr.querySelector(".c-tot b").textContent=fmt(totalDe(r));
    });
  });
  var del=tr.querySelector(".del");
  if(del) del.onclick=function(){ rows.splice(i,1); render(); };
}
function at(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function fmt(n){ n=num(n); return String(n); }

$("editar").onclick=function(){
  if(!editing){
    var pin=prompt("PIN para editar:");
    if(pin!==PIN_OK){ if(pin!==null) toast("PIN incorrecto","err"); return; }
    editing=true;
  } else {
    editing=false;
    ordenar(false);
  }
  render();
};
$("agregar").onclick=function(){
  rows.push({ num:"", piloto:"", nac:"", fmn:"", v:[0,0,0,0,0,0] });
  render();
};
$("ordenar").onclick=function(){ ordenar(true); toast("Ordenado por puntos"); };
$("guardar").onclick=function(){
  var limpio=rows.filter(function(r){ return String(r.piloto).trim()!==""; })
    .map(function(r){ return { num:r.num, piloto:r.piloto, nac:r.nac, fmn:r.fmn, v:r.v.map(num) }; });
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(limpio)); }catch(e){}
  rows=cloneRows(limpio); ordenar(false);
  $("guardar").disabled=true; $("guardar").textContent="Guardando…";
  api({action:"guardarCamp", filas:limpio}).then(function(d){
    $("guardar").disabled=false; $("guardar").textContent="Guardar campeonato";
    if(d && d.ok){ toast("Campeonato guardado en la planilla ✓","ok"); }
    else { toast("Guardado en este equipo. (Para verse en todos lados falta activar el guardado online)","err"); }
    editing=false; render();
  }).catch(function(){
    $("guardar").disabled=false; $("guardar").textContent="Guardar campeonato";
    toast("Guardado en este equipo. (El guardado online no respondió)","err");
    editing=false; render();
  });
};

init();
</script>
</body>
</html>
