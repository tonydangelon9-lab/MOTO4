<style>
  @font-face{font-family:"MGP Display";src:url("05-MGP-FONT/MGPDisplay-Bold.ttf") format("truetype");font-weight:700;font-display:swap}

  :root{--white:#fff;--purple:#D63DFC;--violet:#C604F7;--pink:#E37BFD;--bg:#000;--surface:#0e0410;--surface2:#160518;
    --line:#2a0f30;--muted:#b79bc0;--blue:#7dd3fc;--gold:#fcd34d;

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  .navlinks a.lnk.active::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:var(--grad)}
  nav .btn{padding:9px 20px;font-size:13px}

  footer{border-top:1px solid var(--line);padding:40px 0 34px;text-align:center;color:var(--muted);font-size:13px;background:#000}

  footer .roadto img{height:22px;opacity:.85;margin-top:10px}
  footer .langs{margin-top:10px;font-size:11px;letter-spacing:.1em;text-transform:uppercase}

  .hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.30}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 55% at 50% 32%,rgba(214,61,252,.32),transparent 70%),linear-gradient(180deg,transparent 45%,#000 100%)}
  .hero .wrap{position:relative;z-index:2}
  .hero .mobil{height:24px;margin-bottom:6px;opacity:.95}
  .hero .herologo{max-width:min(720px,92vw);width:100%;margin:2px auto 6px;display:block;filter:drop-shadow(0 12px 38px rgba(214,61,252,.45))}
  .hero h1{font-family:var(--dispx);text-transform:uppercase;font-weight:700;font-size:clamp(18px,3vw,30px);margin:10px 0 6px}
  .hero p{font-size:clamp(12px,1.5vw,15px);color:#cdb8d8;max-width:520px;margin:0 auto 22px}
  .hero .cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .hero .roadto{margin-top:32px} .hero .roadto img{height:26px;opacity:.9}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

  .card{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:var(--surface);padding:28px 22px;transition:transform .15s,border-color .15s;text-align:center}
  .card:hover{transform:translateY(-4px);border-color:var(--purple)}
  .card::before{content:"";position:absolute;left:0;top:0;height:4px;width:100%;background:var(--grad)}
  .card .ico{font-size:30px}
  .card h3{font-family:var(--disp);text-transform:uppercase;font-size:20px;margin:10px 0 6px}
  .card p{color:var(--muted);font-size:13px}

  footer .sponsors{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:24px}
  footer .sp-row{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-evenly;gap:24px;width:100%}
  footer .sp-row.principal img{height:44px;width:auto;display:block;object-fit:contain}
  .logo-blanco{filter:brightness(0) invert(1)}
  footer .sp-row.principal img.sp-pirelli{height:40px}
  footer .sp-row.principal img.sp-honda{height:52px}
  footer .sp-row.principal img.sp-menor{height:22px}
  footer .sp-row.secundario{gap:24px}
  footer .sp-row.secundario img{height:38px;width:auto;display:block;object-fit:contain;opacity:.95}
  footer .sp-row.secundario img.sp-fim{height:52px;opacity:1}
  footer .flogo{height:92px;margin:0 auto 8px;display:block}
  footer .fmeta{margin-top:2px}
  footer .langs{margin-top:10px;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  @media(max-width:560px){footer .sp-row.principal img{height:26px}footer .sp-row.secundario img{height:20px}footer .sp-row{gap:16px}footer .flogo{height:72px}nav img.logo{height:48px}}

  /* Mobil en esquina derecha del nav */
  .nav-mobil{height:20px;width:auto;display:block}
  .nm-mob{display:none}
  @media(max-width:860px){.nm-desk{display:none}.nm-mob{display:block;height:17px;margin-left:auto;margin-right:12px}}

  
  .phead{background:var(--grad-dark);text-align:center;padding:46px 0 30px;position:relative;overflow:hidden}
  .phead::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 90% at 50% 0%,rgba(214,61,252,.28),transparent 70%)}
  .phead .wrap{position:relative;z-index:1}
  .phead .k{font-family:var(--disp);text-transform:uppercase;letter-spacing:.28em;font-size:12px;color:var(--pink)}
  .phead h1{font-family:var(--dispx);text-transform:uppercase;font-weight:700;font-size:clamp(30px,6vw,54px);margin-top:8px;line-height:1}
  .phead p{color:#e9d8ef;margin-top:10px;font-size:15px}
  /* filtros por piloto */
  .mfiltros{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 14px;-webkit-overflow-scrolling:touch}
  .mfiltros button{flex:0 0 auto;font-family:var(--disp);text-transform:uppercase;font-size:12px;letter-spacing:.05em;
    color:#e9d8ef;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer}
  .mfiltros button.act{background:var(--grad);color:#000;border-color:transparent;font-weight:700}
  /* grilla */
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:760px){.mgrid{grid-template-columns:repeat(2,1fr)}}
  .mgrid a{display:block;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--surface);aspect-ratio:3/2}
  .mgrid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
  .mgrid a:hover img{transform:scale(1.05)}
  .mmsg{text-align:center;color:var(--muted);padding:36px 0;font-size:14px}
  /* lightbox */
  .mlb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
  .mlb.open{display:flex}
  .mlb img{max-width:96vw;max-height:88vh;border-radius:10px;box-shadow:0 20px 80px rgba(214,61,252,.35)}
  .mlb .mx{position:absolute;top:16px;right:22px;font-size:30px;color:#fff;cursor:pointer;background:none;border:none}

  </style>
</head>
<body>
<nav><div class="wrap"><a href="index.html"><img class="logo" src="00-LOGOTIPOS/Moto4_Latin_Cup_2_Line_Purple_Grad_White_RGB.png" alt="Moto4 Latin Cup"></a><img class="nav-mobil nm-mob" src="07-LOGOS-SPONSORS/Mobil_White.png" alt="Mobil"><button class="burger" id="burger" aria-label="Menú">&#9776;</button><div class="navlinks" id="menu"><a class="lnk" href="index.html">Inicio</a><a class="lnk" href="calendario.html">Calendario</a><a class="lnk" href="pilotos.html">Pilotos</a><a class="lnk" href="campeonato.html">Ranking 2026</a><a class="lnk active" href="media.html">Media</a><a class="btn" href="postular.html">Postular</a><img class="nav-mobil nm-desk" src="07-LOGOS-SPONSORS/Mobil_White.png" alt="Mobil"></div></div></nav><header class="phead"><div class="wrap"><div class="k">Mobil Moto4 Latin Cup</div><h1>Media</h1><p>Galería oficial de fotos del campeonato.</p></div></header>
<section><div class="wrap">
  <div class="mfiltros" id="mfiltros"></div>
  <div class="mgrid" id="mgrid"></div>
  <div class="mmsg" id="mmsg">Cargando fotos…</div>
</div></section><footer><div class="wrap">
  <div class="sponsors">
    <div class="sp-row principal">
      <img class="sp-mobil" src="07-LOGOS-SPONSORS/Mobil_White.png" alt="Mobil">
      <img class="sp-pirelli" src="07-LOGOS-SPONSORS/Pirelli_Logo.png" alt="Pirelli">
      <img class="sp-honda" src="07-LOGOS-SPONSORS/Honda_Logo.svg" alt="Honda">
      <img class="sp-menor" src="07-LOGOS-SPONSORS/SMK-LOGO-2.webp" alt="SMK">

    </div>
  </div>
  <img class="flogo" src="00-LOGOTIPOS/Moto4_Latin_Cup_2_Line_Purple_Grad_White_RGB.png" alt="Moto4 Latin Cup">

</div></footer><script>var b=document.getElementById("burger"),m=document.getElementById("menu");if(b){b.addEventListener("click",function(){m.classList.toggle("open");});m.querySelectorAll("a").forEach(function(a){a.addEventListener("click",function(){m.classList.remove("open");});});}</script>

<div class="mlb" id="mlb"><button class="mx" id="mx">&#10005;</button><img id="mlbimg" src="" alt=""></div>
<script>
/* ============================================================
   GALERIA MEDIA — lee la carpeta MEDIA/ del repo automaticamente.
   COMO AGREGAR FOTOS (administracion):
   1) En GitHub, carpeta MEDIA/ -> Add file -> Upload files.
   2) Nombre del archivo: empezar con el NUMERO del piloto y un guion.
      Ej:  74-podio-interlagos.jpg  -> va a Kensei Matsudaira
           99-largada.jpg           -> va a Cristobal Carreno
      Sin numero (ej: paddock-general.jpg) -> va a "Generales".
   ============================================================ */
var REPO_DIRS = ["MEDIA","MEDIA-fotos-listas"]; // la pagina lee ambas carpetas
var PILOTOS = {"74":"Kensei Matsudaira","62":"Alberto Enríquez","34":"Andoni Domínguez","10":"Mahdi Salem",
 "64":"Ulises Weyrauch","99":"Cristóbal Carreño","11":"Santiago Gossa","46":"Nicolás Torrez",
 "42":"Murilo Gomes","26":"Santiago Vogel","91":"Aidan Hancock","19":"Lorenzo Tiberi",
 "69":"Anyelo Perdomo","16":"Santiago Bravo","8":"Matías Alarcón","15":"Gael Olivo"};
(function(){
  var grid=document.getElementById("mgrid"), msg=document.getElementById("mmsg"), fil=document.getElementById("mfiltros");
  var fotos=[], filtro="todos";
  function esImg(n){ return /\.(jpg|jpeg|png|webp)$/i.test(n); }
  function grupo(n){ var m=n.match(/^(\d{1,3})-/); return (m && PILOTOS[m[1]]) ? m[1] : "gen"; }
  function pintar(){
    var lista = fotos.filter(function(f){ return filtro==="todos" || f.g===filtro; });
    grid.innerHTML = lista.map(function(f){
      return '<a href="#" data-src="'+f.url+'"><img loading="lazy" src="'+f.url+'" alt=""></a>';
    }).join("");
    msg.style.display = lista.length ? "none" : "block";
    msg.textContent = lista.length ? "" : "Aún no hay fotos en esta categoría.";
    grid.querySelectorAll("a").forEach(function(a){
      a.addEventListener("click",function(e){ e.preventDefault();
        document.getElementById("mlbimg").src=a.getAttribute("data-src");
        document.getElementById("mlb").classList.add("open"); });
    });
  }
  function chips(){
    var grupos={}; fotos.forEach(function(f){ grupos[f.g]=true; });
    var html='<button class="act" data-g="todos">Todos</button>';
    Object.keys(PILOTOS).forEach(function(n){ if(grupos[n]) html+='<button data-g="'+n+'">#'+n+' '+PILOTOS[n]+'</button>'; });
    if(grupos["gen"]) html+='<button data-g="gen">Generales</button>';
    fil.innerHTML=html;
    fil.querySelectorAll("button").forEach(function(b){
      b.addEventListener("click",function(){
        fil.querySelectorAll("button").forEach(function(x){x.className="";});
        b.className="act"; filtro=b.getAttribute("data-g"); pintar();
      });
    });
  }
  Promise.all(REPO_DIRS.map(function(dir){
    return fetch("https://api.github.com/repos/tonydangelon9-lab/MOTO4/contents/"+dir)
      .then(function(r){ return r.ok ? r.json() : []; }).catch(function(){ return []; });
  })).then(function(res){
    var list = [].concat.apply([], res);
    fotos = list.filter(function(f){ return f.type==="file" && esImg(f.name); })
                .map(function(f){ return {url:f.download_url, g:grupo(f.name), n:f.name}; })
                .sort(function(a,b){ return a.n<b.n?-1:1; });
    if(!fotos.length){ msg.textContent="Próximamente: las fotos del campeonato."; return; }
    chips(); pintar();
    if(window.m4Apply) window.m4Apply(document.body);
  }).catch(function(){ msg.textContent="Próximamente: las fotos del campeonato."; });
  document.getElementById("mx").addEventListener("click",function(){ document.getElementById("mlb").classList.remove("open"); });
  document.getElementById("mlb").addEventListener("click",function(e){ if(e.target.id==="mlb") document.getElementById("mlb").classList.remove("open"); });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") document.getElementById("mlb").classList.remove("open"); });
})();
</script>
